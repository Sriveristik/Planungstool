<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Planungstool</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/>
          <line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
        <span>Planer</span>
      </div>
    </div>

    <button class="btn-create" id="btnCreate">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      Neuer Termin
    </button>

    <button class="btn-quick-entry" id="btnQuickEntry">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="4" width="18" height="18" rx="2"/>
        <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
        <line x1="3" y1="10" x2="21" y2="10"/>
        <path d="M8 14h.01M12 14h.01M16 14h.01M8 18h.01M12 18h.01M16 18h.01"/>
      </svg>
      Schnelleintragung
    </button>

    <!-- Mini Calendar -->
    <div class="mini-cal">
      <div class="mini-cal-header">
        <button class="mini-nav" id="miniPrev">&#8249;</button>
        <span class="mini-cal-title" id="miniTitle"></span>
        <button class="mini-nav" id="miniNext">&#8250;</button>
      </div>
      <div class="mini-cal-grid">
        <span class="mini-day-label">Mo</span>
        <span class="mini-day-label">Di</span>
        <span class="mini-day-label">Mi</span>
        <span class="mini-day-label">Do</span>
        <span class="mini-day-label">Fr</span>
        <span class="mini-day-label">Sa</span>
        <span class="mini-day-label">So</span>
      </div>
      <div class="mini-cal-days" id="miniDays"></div>
    </div>

    <!-- Priority Filter -->
    <div class="filter-section">
      <p class="filter-title">Priorität filtern</p>
      <label class="filter-item">
        <input type="checkbox" value="high" checked>
        <span class="filter-dot high"></span> Hoch
      </label>
      <label class="filter-item">
        <input type="checkbox" value="medium" checked>
        <span class="filter-dot medium"></span> Mittel
      </label>
      <label class="filter-item">
        <input type="checkbox" value="low" checked>
        <span class="filter-dot low"></span> Niedrig
      </label>
    </div>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="main">
    <!-- Top Bar -->
    <header class="topbar">
      <div class="topbar-left">
        <button class="btn-today" id="btnToday">Heute</button>
        <div class="nav-arrows">
          <button class="nav-btn" id="btnPrev">&#8249;</button>
          <button class="nav-btn" id="btnNext">&#8250;</button>
        </div>
        <h1 class="current-period" id="currentPeriod"></h1>
      </div>
      <div class="view-switcher">
        <button class="view-btn active" data-view="month">Monat</button>
        <button class="view-btn" data-view="week">Woche</button>
        <button class="view-btn" data-view="twoweek">2 Wochen</button>
        <button class="view-btn" data-view="day">Tag</button>
      </div>
    </header>

    <!-- Calendar Container -->
    <div class="calendar-container" id="calendarContainer"></div>
  </main>

  <!-- CREATE / EDIT MODAL -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modalTitle">Termin erstellen</h2>
        <button class="modal-close" id="modalClose">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>Titel *</label>
          <input type="text" id="evtTitle" placeholder="Terminbezeichnung" value="Arbeit" />
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Datum *</label>
            <input type="date" id="evtDate" />
          </div>
          <div class="form-group">
            <label>Priorität *</label>
            <div class="prio-dropdown" id="prioDropdown">
              <div class="prio-trigger" id="prioTrigger">
                <span id="prioLabel">Mittel</span>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="14" height="14"><polyline points="6 9 12 15 18 9"/></svg>
              </div>
              <div class="prio-menu" id="prioMenu">
                <div class="prio-option" data-value="high">Hoch</div>
                <div class="prio-option" data-value="medium">Mittel</div>
                <div class="prio-option" data-value="low">Niedrig</div>
              </div>
            </div>
            <input type="hidden" id="evtPriority" value="medium" />
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Startzeit</label>
            <input type="time" id="evtStart" value="09:00" />
            <div class="time-quick-btns">
              <button type="button" class="time-quick" data-target="evtStart" data-value="07:00">07:00</button>
              <button type="button" class="time-quick" data-target="evtStart" data-value="09:00">09:00</button>
              <button type="button" class="time-quick" data-target="evtStart" data-value="14:00">14:00</button>
            </div>
          </div>
          <div class="form-group">
            <label>Endzeit</label>
            <input type="time" id="evtEnd" value="10:00" />
            <div class="time-quick-btns">
              <button type="button" class="time-quick" data-target="evtEnd" data-value="14:00">14:00</button>
              <button type="button" class="time-quick" data-target="evtEnd" data-value="18:00">18:00</button>
              <button type="button" class="time-quick" data-target="evtEnd" data-value="22:00">22:00</button>
            </div>
          </div>
        </div>
        <div class="form-group">
          <label>Farbe</label>
          <div class="color-picker-row">
            <div class="color-swatches" id="colorSwatches">
              <button class="swatch active" data-color="#4f46e5" style="background:#4f46e5"></button>
              <button class="swatch" data-color="#0ea5e9" style="background:#0ea5e9"></button>
              <button class="swatch" data-color="#10b981" style="background:#10b981"></button>
              <button class="swatch" data-color="#f59e0b" style="background:#f59e0b"></button>
              <button class="swatch" data-color="#ef4444" style="background:#ef4444"></button>
              <button class="swatch" data-color="#ec4899" style="background:#ec4899"></button>
              <button class="swatch" data-color="#8b5cf6" style="background:#8b5cf6"></button>
              <button class="swatch" data-color="#14b8a6" style="background:#14b8a6"></button>
            </div>
            <input type="color" id="evtColor" value="#4f46e5" title="Eigene Farbe" />
          </div>
        </div>
        <div class="form-group">
          <label>Beschreibung</label>
          <textarea id="evtDesc" placeholder="Optionale Beschreibung..." rows="3"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" id="btnDeleteEvt" style="display:none;">Löschen</button>
        <div style="flex:1"></div>
        <button class="btn-secondary" id="btnCancel">Abbrechen</button>
        <button class="btn-primary" id="btnSave">Speichern</button>
      </div>
    </div>
  </div>

  <!-- QUICK ENTRY MODAL -->
  <div class="modal-overlay" id="quickOverlay">
    <div class="modal quick-modal">
      <div class="modal-header">
        <h2>Schnelleintragung</h2>
        <button class="modal-close" id="quickClose">&times;</button>
      </div>
      <div class="modal-body">

        <!-- Week Navigator -->
        <div class="quick-week-nav">
          <button class="mini-nav" id="quickWeekPrev">&#8249;</button>
          <span id="quickWeekLabel"></span>
          <button class="mini-nav" id="quickWeekNext">&#8250;</button>
        </div>

        <!-- Preset 1: Frühschicht -->
        <div class="quick-preset" id="quickPreset1">
          <div class="quick-preset-info quick-preset-toggle" data-preset="1">
            <span class="quick-radio" id="quickRadio1"></span>
            <span class="quick-color-dot" style="background:#7c3aed"></span>
            <div>
              <div class="quick-preset-name">Frühschicht</div>
              <div class="quick-preset-time">05:30 – 13:30</div>
            </div>
          </div>
          <div class="quick-days-row" id="quickDaysRow1">
            <div class="quick-days" id="quickDays1"></div>
            <div class="quick-day-actions">
              <button class="quick-sel-btn" data-preset="1" data-action="all">Alle</button>
              <button class="quick-sel-btn" data-preset="1" data-action="none">Keine</button>
            </div>
          </div>
        </div>

        <!-- Preset 2: Spätschicht -->
        <div class="quick-preset" id="quickPreset2">
          <div class="quick-preset-info quick-preset-toggle" data-preset="2">
            <span class="quick-radio" id="quickRadio2"></span>
            <span class="quick-color-dot" style="background:#ca8a04"></span>
            <div>
              <div class="quick-preset-name">Spätschicht</div>
              <div class="quick-preset-time">13:30 – 21:30</div>
            </div>
          </div>
          <div class="quick-days-row" id="quickDaysRow2">
            <div class="quick-days" id="quickDays2"></div>
            <div class="quick-day-actions">
              <button class="quick-sel-btn" data-preset="2" data-action="all">Alle</button>
              <button class="quick-sel-btn" data-preset="2" data-action="none">Keine</button>
            </div>
          </div>
        </div>

      </div>
      <div class="modal-footer">
        <div style="flex:1"></div>
        <button class="btn-secondary" id="quickCancel">Abbrechen</button>
        <button class="btn-primary" id="quickSave">Eintragen</button>
      </div>
    </div>
  </div>

  <!-- EVENT DETAIL POPUP -->
  <div class="event-popup" id="eventPopup">
    <div class="popup-header" id="popupHeader">
      <span id="popupTitle"></span>
      <div class="popup-actions">
        <button id="popupEdit" title="Bearbeiten">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
          </svg>
        </button>
        <button id="popupDelete" title="Löschen">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
            <path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/>
          </svg>
        </button>
        <button id="popupClose" title="Schließen">&times;</button>
      </div>
    </div>
    <div class="popup-body">
      <p id="popupDate"></p>
      <p id="popupTime"></p>
      <p id="popupPriority"></p>
      <p id="popupDesc"></p>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
